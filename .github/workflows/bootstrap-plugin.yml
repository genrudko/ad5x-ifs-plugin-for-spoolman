name: Bootstrap plugin sources

on:
  workflow_dispatch:
  push:
    paths:
      - '.bootstrap/complete'

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reconstruct plugin source archive
        run: |
          cat .bootstrap/part* > /tmp/plugin_payload.b64
          base64 --decode /tmp/plugin_payload.b64 > /tmp/plugin_payload.tar.gz
          echo '7271913f148c6befb27c9c02511a0cdadbec28657d231b819f306e2b1f1ce965  /tmp/plugin_payload.tar.gz' | sha256sum -c -
          tar -xzf /tmp/plugin_payload.tar.gz
      - name: Commit extracted plugin sources
        run: |
          rm -rf .bootstrap
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add plugin source files'
          git push
