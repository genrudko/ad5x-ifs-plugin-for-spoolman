name: Bootstrap plugin sources

on:
  workflow_dispatch:
  push:
    paths:
      - '.bootstrap/retry'

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct plugin source archive
        run: |
          python3 - <<'PY'
          import base64
          import hashlib
          import itertools
          import io
          import re
          import tarfile
          from pathlib import Path

          required = {
              "plugin/ifs_spoolman.py",
              "plugin/ui_v0_2.html",
              "plugin/ifs-spoolman-card.js",
              "plugin/ifs-spoolman-layout.js",
          }

          parts = []
          for index in range(8):
              path = Path(f".bootstrap/part{index:02d}")
              raw = path.read_text(encoding="utf-8")
              clean = "".join(re.findall(r"[A-Za-z0-9+/=]", raw))
              parts.append(clean)
              print(f"part{index:02d}: raw={len(raw)} clean={len(clean)}")

          found = None

          for trims in itertools.product(range(4), repeat=8):
              selected = []
              valid = True

              for part, trim in zip(parts, trims):
                  if trim >= len(part):
                      valid = False
                      break
                  selected.append(part[:-trim] if trim else part)

              if not valid:
                  continue

              payload = "".join(selected)
              if len(payload) % 4:
                  continue

              try:
                  decoded = base64.b64decode(payload, validate=True)
              except Exception:
                  continue

              if not decoded.startswith(b"\x1f\x8b"):
                  continue

              try:
                  with tarfile.open(fileobj=io.BytesIO(decoded), mode="r:gz") as tf:
                      names = set(tf.getnames())
                      if not required.issubset(names):
                          continue
              except Exception:
                  continue

              found = (trims, decoded)
              break

          if found is None:
              raise SystemExit("Unable to reconstruct a valid plugin archive")

          trims, decoded = found
          digest = hashlib.sha256(decoded).hexdigest()
          print(f"Matched trims: {trims}")
          print(f"Archive bytes: {len(decoded)}")
          print(f"Archive SHA-256: {digest}")

          archive = Path("/tmp/plugin_payload.tar.gz")
          archive.write_bytes(decoded)

          with tarfile.open(archive, "r:gz") as tf:
              tf.extractall(".")
          PY

      - name: Validate extracted sources
        run: |
          python3 -m py_compile plugin/ifs_spoolman.py
          test -s plugin/ui_v0_2.html
          test -s plugin/ifs-spoolman-card.js
          test -s plugin/ifs-spoolman-layout.js

      - name: Commit extracted plugin sources
        run: |
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap-plugin.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add plugin source files'
          git push
