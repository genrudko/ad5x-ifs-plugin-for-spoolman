<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AD5X IFS — филаменты Z-Mod</title>
<style>
:root{color-scheme:dark;--bg:#0b1020;--panel:#141b2d;--panel2:#1a2338;--text:#edf2ff;--muted:#9eabc4;--line:#2a3550;--accent:#5b8cff;--ok:#42d392;--danger:#ff6b7a;--shadow:0 18px 48px rgba(0,0,0,.32)}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#17213b 0,#0b1020 42%);font:14px/1.45 system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text)}
main{width:min(1180px,calc(100% - 28px));margin:0 auto;padding:28px 0 44px}.hero,.slot,.notice{background:rgba(20,27,45,.94);border:1px solid var(--line);box-shadow:var(--shadow)}
.hero{display:flex;justify-content:space-between;gap:20px;align-items:center;padding:22px;border-radius:20px}.hero h1{margin:0 0 5px;font-size:24px}.hero p{margin:0;color:var(--muted)}
.status{display:flex;align-items:center;gap:8px;white-space:nowrap;color:var(--muted)}.dot{width:10px;height:10px;border-radius:50%;background:#72809b}.dot.ok{background:var(--ok);box-shadow:0 0 0 5px rgba(66,211,146,.12)}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-top:18px}.slot{border-radius:18px;padding:18px;position:relative;overflow:hidden}.slot.active{border-color:rgba(91,140,255,.7)}.slot.active:before{content:"АКТИВНЫЙ";position:absolute;right:14px;top:14px;font-size:10px;font-weight:800;letter-spacing:.08em;color:#b9ccff}.slot.empty{opacity:.82}.slot.empty .swatch{filter:grayscale(1);background:#263044!important}.slot.empty:not(.active):before{content:"ПУСТО";position:absolute;right:14px;top:14px;font-size:10px;font-weight:800;letter-spacing:.08em;color:#a9b3c8}.slot.active.empty:before{content:"АКТИВНЫЙ · ПУСТО"}
.slot-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}.swatch{width:50px;height:50px;border-radius:50%;border:6px solid rgba(255,255,255,.18);box-shadow:inset 0 0 0 2px rgba(0,0,0,.25)}.slot h2{font-size:18px;margin:0}.sub{color:var(--muted);font-size:12px}.presence{margin-top:3px;font-size:11px;font-weight:700}.presence.present{color:#8be7bd}.presence.empty{color:#c2cad9}.presence.unknown{color:#e8c36a}.empty-note{margin-top:4px;font-size:11px;color:#aeb8cc}
.fields{display:grid;grid-template-columns:minmax(240px,1.25fr) minmax(220px,1fr);gap:14px}.field label{display:block;color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}.color-row{display:flex;gap:8px}.color-picker{width:48px;height:42px;padding:2px;border:1px solid var(--line);border-radius:10px;background:var(--panel2)}input[type=text],select{width:100%;height:42px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);color:var(--text);padding:0 11px;outline:none}input:focus,select:focus{border-color:var(--accent)}
.palette-wrap{margin-top:9px}.palette-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:7px}.palette-title{font-size:11px;color:var(--muted)}.palette-toggle{height:28px;padding:0 9px;border-radius:8px;font-size:11px}.palette{display:flex;flex-wrap:wrap;gap:7px}.color-chip{width:24px;height:24px;padding:0;border:2px solid rgba(255,255,255,.28);border-radius:7px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.2)}.color-chip:hover{transform:translateY(-1px)}.color-chip.selected{outline:2px solid var(--accent);outline-offset:2px}.palette.extra{margin-top:7px}.hidden{display:none!important}
.material-stack{display:grid;gap:8px}.custom-wrap{display:grid;gap:5px}.custom-hint{font-size:11px;color:var(--muted)}
.actions{display:flex;justify-content:flex-end;gap:9px;margin-top:16px}button{height:40px;border-radius:10px;border:1px solid var(--line);padding:0 15px;font-weight:700;cursor:pointer;background:var(--panel2);color:var(--text)}button.primary{background:var(--accent);border-color:var(--accent);color:white}button:disabled{opacity:.5;cursor:not-allowed}
.notice{margin-top:18px;border-radius:16px;padding:14px 16px;color:var(--muted)}.notice.error{border-color:rgba(255,107,122,.55);color:#ffc1c7}.notice.success{border-color:rgba(66,211,146,.5);color:#a8f0d0}
@media(max-width:760px){.hero{align-items:flex-start;flex-direction:column}.grid{grid-template-columns:1fr}.fields{grid-template-columns:1fr}}
</style>
</head>
<body>
<main>
<section class="hero"><div><h1>Филаменты Z-Mod</h1><p>Штатные цвет и материал слотов IFS. Spoolman не обязателен.</p></div><div class="status"><span class="dot" id="dot"></span><span id="status">Подключение…</span></div></section>
<section class="grid" id="grid"></section>
<div class="notice hidden" id="notice"></div>
</main>
<script>
"use strict";
const grid=document.getElementById("grid"),notice=document.getElementById("notice"),statusEl=document.getElementById("status"),dot=document.getElementById("dot");
const MATERIALS=["PLA","PLA+","PETG","PETG-CF","ABS","ASA","TPU","TPE","PC","PA","PA-CF","PVA","HIPS","PP","PET","PCTG","CPE","PEI","PEEK"];
const COLORS=[
{name:"Белый",hex:"#FFFFFF",group:"basic"},{name:"Слоновая кость",hex:"#F5F2E8",group:"basic"},{name:"Бежевый",hex:"#D8C3A5",group:"basic"},{name:"Жёлтый",hex:"#FFD23F",group:"basic"},{name:"Золотой",hex:"#D9A10B",group:"basic"},{name:"Оранжевый",hex:"#FF7A2F",group:"basic"},{name:"Красный",hex:"#E53935",group:"basic"},{name:"Бордовый",hex:"#8E2635",group:"basic"},{name:"Розовый",hex:"#F48FB1",group:"basic"},{name:"Малиновый",hex:"#C2185B",group:"basic"},{name:"Фиолетовый",hex:"#6849C6",group:"basic"},{name:"Сиреневый",hex:"#A58AD3",group:"basic"},
{name:"Тёмно-синий",hex:"#28468B",group:"extra"},{name:"Синий",hex:"#2D70D6",group:"extra"},{name:"Голубой",hex:"#35B8E0",group:"extra"},{name:"Бирюзовый",hex:"#20B2AA",group:"extra"},{name:"Изумрудный",hex:"#24B96B",group:"extra"},{name:"Зелёный",hex:"#237A43",group:"extra"},{name:"Лаймовый",hex:"#7CC70D",group:"extra"},{name:"Коричневый",hex:"#7A4A2D",group:"extra"},{name:"Медный",hex:"#B86D2A",group:"extra"},{name:"Серебристый",hex:"#A7ADB4",group:"extra"},{name:"Серый",hex:"#6B7280",group:"extra"},{name:"Графитовый",hex:"#3D4654",group:"extra"},{name:"Чёрный",hex:"#161616",group:"extra"},{name:"Натуральный",hex:"#E7F2F5",group:"extra"},{name:"Песочный",hex:"#C8B47B",group:"extra"},{name:"Мятный",hex:"#91D9BE",group:"extra"},{name:"Лавандовый",hex:"#A789E8",group:"extra"},{name:"Коралловый",hex:"#FF7F73",group:"extra"}
];
let model=null,presence=null;
function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function message(text,type="success"){notice.textContent=text;notice.className=`notice ${type}`;clearTimeout(message.timer);message.timer=setTimeout(()=>notice.className="notice hidden",4500);}
async function api(path,options={}){const r=await fetch(path,{cache:"no-store",...options});let data={};try{data=await r.json();}catch{}if(!r.ok)throw new Error(data.error||`HTTP ${r.status}`);return data;}
function presenceState(slot){const value=presence?.slots?.[String(slot)]?.filament_present;return value===true?"present":value===false?"empty":"unknown";}
function colorButtons(group,color){return COLORS.filter(x=>x.group===group).map(x=>`<button type="button" class="color-chip${x.hex.toUpperCase()===color.toUpperCase()?" selected":""}" data-color="${x.hex}" style="background:${x.hex}" title="${esc(x.name)} · ${x.hex}" aria-label="${esc(x.name)} ${x.hex}"></button>`).join("");}
function materialControls(material){const known=MATERIALS.includes(material),selected=known?material:"__custom__";return `<div class="material-stack"><select class="material-select">${MATERIALS.map(x=>`<option value="${esc(x)}"${x===selected?" selected":""}>${esc(x)}</option>`).join("")}<option value="__custom__"${selected==="__custom__"?" selected":""}>Другое…</option></select><div class="custom-wrap${selected==="__custom__"?"":" hidden"}"><input class="material-custom" type="text" maxlength="32" value="${selected==="__custom__"?esc(material):""}" placeholder="Введите материал"><div class="custom-hint">Произвольное название до 32 символов</div></div></div>`;}
function slotCard(slot,data){const color=data.color||"#64748B",material=data.material||"",state=presenceState(slot),isEmpty=state==="empty",isActive=Number(model.active_slot)===slot;const presenceText=state==="present"?"Филамент установлен":state==="empty"?"Филамента нет":"Наличие не определено";const metaText=isEmpty?`Последние параметры: ${data.color||"цвет не задан"} · ${data.material||"материал не задан"}`:`${data.color||"Цвет не задан"} · ${data.material||"Материал не задан"}`;return `<article class="slot${isActive?" active":""}${isEmpty?" empty":""}" data-slot="${slot}"><div class="slot-head"><div class="swatch" style="background:${esc(color)}"></div><div><h2>IFS ${slot}</h2><div class="sub">${esc(metaText)}</div><div class="presence ${state}">${esc(presenceText)}</div>${isEmpty?'<div class="empty-note">Настройка следующей катушки</div>':""}</div></div><div class="fields"><div class="field"><label>Цвет</label><div class="color-row"><input class="color-picker" type="color" value="${esc(color)}"><input class="color-text" type="text" value="${esc(color)}" maxlength="7"></div><div class="palette-wrap"><div class="palette-head"><span class="palette-title">Основные цвета</span><button type="button" class="palette-toggle">Ещё цвета ▾</button></div><div class="palette basic">${colorButtons("basic",color)}</div><div class="palette extra hidden">${colorButtons("extra",color)}</div></div></div><div class="field"><label>Материал</label>${materialControls(material)}</div></div><div class="actions"><button class="reset">Сбросить</button><button class="primary save">Сохранить</button></div></article>`;}
function updateColor(card,value){const v=value.trim().toUpperCase();card.querySelector(".color-text").value=v;if(/^#[0-9A-F]{6}$/.test(v)){card.querySelector(".color-picker").value=v;card.querySelector(".swatch").style.background=v;card.querySelectorAll(".color-chip").forEach(chip=>chip.classList.toggle("selected",chip.dataset.color.toUpperCase()===v));}}
function bind(){document.querySelectorAll(".slot").forEach(card=>{const slot=Number(card.dataset.slot),picker=card.querySelector(".color-picker"),text=card.querySelector(".color-text"),select=card.querySelector(".material-select"),customWrap=card.querySelector(".custom-wrap"),custom=card.querySelector(".material-custom");picker.addEventListener("input",()=>updateColor(card,picker.value));text.addEventListener("input",()=>updateColor(card,text.value));card.querySelectorAll(".color-chip").forEach(chip=>chip.addEventListener("click",()=>updateColor(card,chip.dataset.color)));card.querySelector(".palette-toggle").addEventListener("click",e=>{const extra=card.querySelector(".palette.extra"),open=extra.classList.toggle("hidden")===false;e.currentTarget.textContent=open?"Скрыть цвета ▴":"Ещё цвета ▾";});select.addEventListener("change",()=>{const isCustom=select.value==="__custom__";customWrap.classList.toggle("hidden",!isCustom);if(isCustom)setTimeout(()=>custom.focus(),0);});card.querySelector(".reset").addEventListener("click",()=>render());card.querySelector(".save").addEventListener("click",()=>save(slot,card));});}
function render(){grid.innerHTML="";for(let i=1;i<=4;i++)grid.insertAdjacentHTML("beforeend",slotCard(i,model.slots[String(i)]||{}));bind();}
async function load(){try{[model,presence]=await Promise.all([api("/api/zmod/filaments?refresh=1"),api("/api/ifs/slots?refresh=1")]);if(!model.available)throw new Error(model.reason||"Источник FFMInfo не найден");render();dot.classList.add("ok");const occupied=Object.values(presence.slots||{}).filter(x=>x.filament_present===true).length;statusEl.textContent=`Z-Mod подключён · активный слот ${model.active_slot??"—"} · занято ${occupied}/4`;}catch(e){dot.classList.remove("ok");statusEl.textContent="Ошибка подключения";message(e.message,"error");}}
async function save(slot,card){const button=card.querySelector(".save");button.disabled=true;try{const color=card.querySelector(".color-text").value.trim().toUpperCase(),select=card.querySelector(".material-select"),material=select.value==="__custom__"?card.querySelector(".material-custom").value.trim():select.value;if(!material)throw new Error("Укажи материал");const result=await api("/api/zmod/filaments/slot",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({slot,color,material})});message(result.changed?`Слот ${slot} сохранён. Резервная копия создана.`:`Слот ${slot}: изменений нет.`);await load();}catch(e){message(e.message,"error");}finally{button.disabled=false;}}
load();
</script>
</body>
</html>
