<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AD5X IFS — филаменты Z-Mod</title>
<style>
:root{color-scheme:dark;--bg:#0b1020;--panel:#141b2d;--panel2:#1a2338;--text:#edf2ff;--muted:#9eabc4;--line:#2a3550;--accent:#5b8cff;--ok:#42d392;--danger:#ff6b7a;--shadow:0 18px 48px rgba(0,0,0,.32)}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#17213b 0,#0b1020 42%);font:14px/1.45 system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text)}
main{width:min(1120px,calc(100% - 28px));margin:0 auto;padding:28px 0 44px}.hero,.slot,.notice{background:rgba(20,27,45,.94);border:1px solid var(--line);box-shadow:var(--shadow)}
.hero{display:flex;justify-content:space-between;gap:20px;align-items:center;padding:22px;border-radius:20px}.hero h1{margin:0 0 5px;font-size:24px}.hero p{margin:0;color:var(--muted)}
.status{display:flex;align-items:center;gap:8px;white-space:nowrap;color:var(--muted)}.dot{width:10px;height:10px;border-radius:50%;background:#72809b}.dot.ok{background:var(--ok);box-shadow:0 0 0 5px rgba(66,211,146,.12)}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-top:18px}.slot{border-radius:18px;padding:18px;position:relative;overflow:hidden}.slot.active{border-color:rgba(91,140,255,.7)}.slot.active:before{content:"АКТИВНЫЙ";position:absolute;right:14px;top:14px;font-size:10px;font-weight:800;letter-spacing:.08em;color:#b9ccff}.slot.empty{opacity:.78}.slot.empty .swatch{filter:grayscale(1);background:#263044!important}.slot.empty:not(.active):before{content:"ПУСТО";position:absolute;right:14px;top:14px;font-size:10px;font-weight:800;letter-spacing:.08em;color:#a9b3c8}.slot.active.empty:before{content:"АКТИВНЫЙ · ПУСТО"}
.slot-head{display:flex;align-items:center;gap:12px;margin-bottom:18px}.swatch{width:50px;height:50px;border-radius:50%;border:6px solid rgba(255,255,255,.18);box-shadow:inset 0 0 0 2px rgba(0,0,0,.25)}.slot h2{font-size:18px;margin:0}.sub{color:var(--muted);font-size:12px}.presence{margin-top:3px;font-size:11px;font-weight:700}.presence.present{color:#8be7bd}.presence.empty{color:#c2cad9}.presence.unknown{color:#e8c36a}
.fields{display:grid;grid-template-columns:150px 1fr;gap:12px}.field label{display:block;color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}.color-row{display:flex;gap:8px}.color-picker{width:48px;height:42px;padding:2px;border:1px solid var(--line);border-radius:10px;background:var(--panel2)}input[type=text]{width:100%;height:42px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);color:var(--text);padding:0 11px;outline:none}input:focus{border-color:var(--accent)}
.actions{display:flex;justify-content:flex-end;gap:9px;margin-top:16px}button{height:40px;border-radius:10px;border:1px solid var(--line);padding:0 15px;font-weight:700;cursor:pointer;background:var(--panel2);color:var(--text)}button.primary{background:var(--accent);border-color:var(--accent);color:white}button:disabled{opacity:.5;cursor:not-allowed}
.notice{margin-top:18px;border-radius:16px;padding:14px 16px;color:var(--muted)}.notice.error{border-color:rgba(255,107,122,.55);color:#ffc1c7}.notice.success{border-color:rgba(66,211,146,.5);color:#a8f0d0}.hidden{display:none}
@media(max-width:760px){.hero{align-items:flex-start;flex-direction:column}.grid{grid-template-columns:1fr}.fields{grid-template-columns:1fr}}
</style>
</head>
<body>
<main>
<section class="hero"><div><h1>Филаменты Z-Mod</h1><p>Штатные цвет и материал слотов IFS. Spoolman не обязателен.</p></div><div class="status"><span class="dot" id="dot"></span><span id="status">Подключение…</span></div></section>
<section class="grid" id="grid"></section>
<div class="notice hidden" id="notice"></div>
</main>
<script>
"use strict";
const grid=document.getElementById("grid"),notice=document.getElementById("notice"),statusEl=document.getElementById("status"),dot=document.getElementById("dot");
let model=null,presence=null;
function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function message(text,type="success"){notice.textContent=text;notice.className=`notice ${type}`;clearTimeout(message.timer);message.timer=setTimeout(()=>notice.className="notice hidden",4500);}
async function api(path,options={}){const r=await fetch(path,{cache:"no-store",...options});let data={};try{data=await r.json();}catch{}if(!r.ok)throw new Error(data.error||`HTTP ${r.status}`);return data;}
function presenceState(slot){const value=presence?.slots?.[String(slot)]?.filament_present;return value===true?"present":value===false?"empty":"unknown";}
function slotCard(slot,data){const color=data.color||"#64748B",material=data.material||"",state=presenceState(slot),isEmpty=state==="empty",isActive=Number(model.active_slot)===slot;const presenceText=state==="present"?"Филамент установлен":state==="empty"?"Филамента нет":"Наличие не определено";const metaText=isEmpty?`Последние параметры: ${data.color||"цвет не задан"} · ${data.material||"материал не задан"}`:`${data.color||"Цвет не задан"} · ${data.material||"Материал не задан"}`;return `<article class="slot${isActive?" active":""}${isEmpty?" empty":""}" data-slot="${slot}"><div class="slot-head"><div class="swatch" style="background:${esc(color)}"></div><div><h2>IFS ${slot}</h2><div class="sub">${esc(metaText)}</div><div class="presence ${state}">${esc(presenceText)}</div></div></div><div class="fields"><div class="field"><label>Цвет</label><div class="color-row"><input class="color-picker" type="color" value="${esc(color)}"><input class="color-text" type="text" value="${esc(color)}" maxlength="7"></div></div><div class="field"><label>Материал</label><input class="material" type="text" value="${esc(material)}" maxlength="32" placeholder="PLA, PETG, ABS…"></div></div><div class="actions"><button class="reset">Сбросить</button><button class="primary save">Сохранить</button></div></article>`;}
function bind(){document.querySelectorAll(".slot").forEach(card=>{const slot=Number(card.dataset.slot),picker=card.querySelector(".color-picker"),text=card.querySelector(".color-text"),swatch=card.querySelector(".swatch");picker.addEventListener("input",()=>{text.value=picker.value.toUpperCase();swatch.style.background=picker.value});text.addEventListener("input",()=>{const v=text.value.trim();if(/^#[0-9a-fA-F]{6}$/.test(v)){picker.value=v;swatch.style.background=v}});card.querySelector(".reset").addEventListener("click",()=>render());card.querySelector(".save").addEventListener("click",()=>save(slot,card));});}
function render(){grid.innerHTML="";for(let i=1;i<=4;i++)grid.insertAdjacentHTML("beforeend",slotCard(i,model.slots[String(i)]||{}));bind();}
async function load(){try{[model,presence]=await Promise.all([api("/api/zmod/filaments?refresh=1"),api("/api/ifs/slots?refresh=1")]);if(!model.available)throw new Error(model.reason||"Источник FFMInfo не найден");render();dot.classList.add("ok");const occupied=Object.values(presence.slots||{}).filter(x=>x.filament_present===true).length;statusEl.textContent=`Z-Mod подключён · активный слот ${model.active_slot??"—"} · занято ${occupied}/4`;}catch(e){dot.classList.remove("ok");statusEl.textContent="Ошибка подключения";message(e.message,"error");}}
async function save(slot,card){const button=card.querySelector(".save");button.disabled=true;try{const color=card.querySelector(".color-text").value.trim().toUpperCase(),material=card.querySelector(".material").value.trim();const result=await api("/api/zmod/filaments/slot",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({slot,color,material})});message(result.changed?`Слот ${slot} сохранён. Резервная копия создана.`:`Слот ${slot}: изменений нет.`);await load();}catch(e){message(e.message,"error");}finally{button.disabled=false;}}
load();
</script>
</body>
</html>
